name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:


env:
  FOUNDRY_PROFILE: ci
  MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    environment: tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Show Forge version
        run: |
          forge --version

      - name: Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Forge build
        run: |
          forge build --sizes
        id: build

      - name: Deployment manifest drift check
        run: |
          forge script ExportDeployments
          if ! git diff --exit-code deployments.mainnet.md deployments.sepolia.md; then
            echo "::error::deployments.{mainnet,sepolia}.md is out of sync with the .sol manifest. Run 'just export-deployments' and commit the result."
            exit 1
          fi
        id: deployments_drift

      - name: Forge tests (no invariants)
        run: |
          forge test --no-match-contract Invariant -vvv
        id: unit_tests

      - name: Lean Invariant tests
        run: |
          sed -i 's/runs = [0-9]*/runs = 1/' foundry.toml
          sed -i 's/depth = [0-9]*/depth = 5/' foundry.toml
          forge test --match-contract Invariant
        id: invariants
